version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    restart: always
    environment:
      - TZ=America/Recife
      - MYSQL_ROOT_PASSWORD=$MYSQL_ROOT_PASSWORD
      - MYSQL_DATABASE=db_fricon
    volumes:
      - ./data-mysql:/var/lib/mysql
    ports:
      - "127.0.0.1:3306:3306" # Liberado para o Workbench do TI e sua Mesh
    networks:
      - iot-net
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost", "-u", "root", "-p$MYSQL_ROOT_PASSWORD"]
      timeout: 20s
      retries: 10
  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    restart: always
    environment:
      - TZ=America/Recife
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=AutoFricon
      - DOCKER_INFLUXDB_INIT_PASSWORD=FriconPG
      - DOCKER_INFLUXDB_INIT_ORG=MercoFricon
      - DOCKER_INFLUXDB_INIT_BUCKET=telemetria_olma
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=$TOKEN_INFLUX
    volumes:
      - ./data-influxdb:/var/lib/influxdb2
    ports:
      - "127.0.0.1:8086:8086"
    networks:
      - iot-net
  node-red:
    image: nodered/node-red:latest
    container_name: node-red
    restart: always
    volumes:
      - ./data-nodered:/data # Mudado para relativo para facilitar portabilidade
    environment:
      - TZ=America/Recife
    dns:
      - 8.8.8.8
      - 1.1.1.1
    networks:
      - iot-net
    depends_on:
      mysql-db:
        condition: service_healthy # Só sobe o Node-RED quando o MySQL responder "OK"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    user: "472"
    restart: always
    environment:
      - TZ=America/Recife
      - GF_SERVER_ROOT_URL=http://localhost:8080/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - ./data-grafana:/var/lib/grafana
    networks:
      - iot-net
    depends_on:
      mysql-db:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000" # Exposto para TVs e PCs na Mesh

  nginx-proxy:
    image: nginx:latest
    container_name: nginx-proxy
    restart: always
    ports:
      - "127.0.0.1:80:80" # Limita quem esta na rede Mesh, so quem tiver no tunel pode enxergar as aplicaçoes.
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - node-red
      - grafana
    networks:
      - iot-net

networks:
  iot-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
